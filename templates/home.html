<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="icon">     🎓
                </div>
                <h1>Student Performance Predictor</h1>
                <p>
                    Predict Maths Score using Machine Learning
                </p>
            </div>
            <form action="{{ url_for('predict_datapoint') }}" method="POST">
                <div class="grid">
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" required>

                            <option value="" selected disabled>Select Gender</option>

                            <option value="male">Male</option>

                            <option value="female">Female</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Race / Ethnicity</label>

                        <select name="race_ethnicity" required>

                            <option value="" selected disabled>Select Group</option>

                            <option value="group A">Group A</option>

                            <option value="group B">Group B</option>

                            <option value="group C">Group C</option>

                            <option value="group D">Group D</option>

                            <option value="group E">Group E</option>

                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label>Parental Level of Education</label>

                    <select name="parental_level_of_education" required>

                        <option value="" selected disabled>Select Education</option>

                        <option value="associate's degree">Associate's Degree</option>

                        <option value="bachelor's degree">Bachelor's Degree</option>

                        <option value="high school">High School</option>

                        <option value="master's degree">Master's Degree</option>

                        <option value="some college">Some College</option>

                        <option value="some high school">Some High School</option>

                    </select>

                </div>

                <div class="grid">

                    <div class="form-group">

                        <label>Lunch Type</label>

                        <select name="lunch" required>

                            <option value="" selected disabled>Select Lunch</option>

                            <option value="standard">Standard</option>

                            <option value="free/reduced">Free / Reduced</option>

                        </select>

                    </div>
                    <div class="form-group">
                        <label>Test Preparation Course</label>
                        <select name="test_preparation_course" required>
                            <option value="" selected disabled>Select Course</option>
                            <option value="completed">Completed</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                </div>
                <div class="grid">
                    <div class="form-group">

                        <label>Reading Score</label>

                        <input
                            type="number"
                            name="reading_score"
                            min="0"
                            max="100"
                            placeholder="Enter Reading Score"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Writing Score</label>

                        <input
                            type="number"
                            name="writing_score"
                            min="0"
                            max="100"
                            placeholder="Enter Writing Score"
                            required>

                    </div>

                </div>

                <button class="btn" type="submit">

                    🚀 Predict Maths Score
                </button>
                                {% if results %}
                <div class="result-card">
                  <h2>Prediction Result</h2>
                    <div class="score">
                        {{ results }}
                    </div>
                    <p class="result-text">
                        Predicted Maths Score
                    </p>
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
